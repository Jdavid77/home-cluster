# exit-node
# Tailscale with NordVPN
services:
  tailscale:
    image: "tailscale/tailscale:v1.96.5"
    container_name: tailnord-tailscale
    hostname: tailnord-tailscale
    command:
      - /scripts/tailscale.sh
    user: root
    restart: always
    volumes:
      - "/dev/net/tun:/dev/net/tun"
      - "CHANGE_TO_COMPOSE_DATA_PATH/tailscale:/var/lib/tailscale"
      - "CHANGE_TO_COMPOSE_DATA_PATH/scripts/tailscale:/scripts"
    env_file:
      - ./exit-node.env
    cap_add:
      - net_admin
      - sys_module
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1
      - net.ipv6.conf.all.forwarding=1
    networks:
      tailnord-net:
        ipv4_address: 10.1.1.2
  nordvpn:
    image: tailnord
    container_name: tailnord-nordvpn
    hostname: tailnord-nordvpn
    entrypoint:
      - /scripts/nordvpn.sh
    restart: always
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1
      - net.ipv6.conf.all.disable_ipv6=1
    env_file:
      - ./exit-node.env
    environment:
      - "NORDVPN_ENDPOINT=Madrid"
      - "NORDVPN_TECHNOLOGY=openvpn"
      - "NORDVPN_OPENVPN_PROTOCOL=tcp"
    volumes:
      - "/dev/net/tun:/dev/net/tun"
      - "CHANGE_TO_COMPOSE_DATA_PATH/scripts/nordvpn:/scripts"
    cap_add:
      - net_admin
      - sys_module
    networks:
      tailnord-net:
        ipv4_address: 10.1.1.3
networks:
  tailnord-net:
    enable_ipv6: false
    ipam:
      config:
        - subnet: 10.1.1.0/24
