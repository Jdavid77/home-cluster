---
helmDefaults:
  wait: true
  waitForJobs: true
  timeout: 600
  force: true

repositories:
  - name: postfinance
    url: https://postfinance.github.io/kubelet-csr-approver

releases:
  - name: prometheus-operator-crds
    namespace: kube-system
    chart: oci://ghcr.io/prometheus-community/charts/prometheus-operator-crds
    version: 28.0.1

  - name: cilium
    namespace: kube-system
    chart: oci://quay.io/cilium/charts/cilium
    version: 1.19.2
    values:
      - ../../../k8s/apps/kube-system/cilium/app/values.yaml
    needs:
      - kube-system/prometheus-operator-crds

  - name: kubelet-csr-approver
    namespace: kube-system
    chart: postfinance/kubelet-csr-approver
    version: 1.2.13
    values:
      - ../../../k8s/apps/kube-system/kubelet-csr-approver/app/values.yaml
    needs:
      - kube-system/cilium

  - name: spegel
    namespace: kube-system
    chart: oci://ghcr.io/spegel-org/helm-charts/spegel
    version: 0.6.0
    values:
      - ../../../k8s/apps/kube-system/spegel/app/values.yaml
    needs:
      - kube-system/kubelet-csr-approver

  - name: grafana-operator
    namespace: monitoring
    chart: oci://ghcr.io/grafana/helm-charts/grafana-operator
    version: 5.22.2
    values:
      - ../../../k8s/apps/monitoring/grafana-operator/app/values.yaml
    needs:
      - kube-system/kubelet-csr-approver

  - name: envoy-gateway
    namespace: network
    chart: oci://mirror.gcr.io/envoyproxy/gateway-helm
    version: v1.7.1
    values:
      - ../../../k8s/apps/network/envoy-gateway/app/values.yaml
    needs:
      - kube-system/kubelet-csr-approver

  - name: longhorn
    namespace: longhorn-system
    chart: oci://ghcr.io/home-operations/charts-mirror/longhorn
    version: 1.11.1
    values:
      - ../../../k8s/apps/longhorn-system/longhorn/app/values.yaml
    needs:
      - kube-system/kubelet-csr-approver

  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.45.1
    atomic: true
    values:
      - ../../../k8s/apps/flux-system/flux-operator/app/values.yaml
    needs:
      - kube-system/kubelet-csr-approver

  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.46.0
    atomic: true
    values:
      - ../../../k8s/apps/flux-system/flux-operator/instance/values.yaml
    needs:
      - flux-system/flux-operator
      - network/envoy-gateway
