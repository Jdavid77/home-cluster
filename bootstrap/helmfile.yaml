helmDefaults:
  wait: true
  waitForJobs: true
  timeout: 600
  force: true
  atomic: true
releases:
  - name: cilium
    namespace: kube-system
    chart: oci://quay.io/cilium/charts/cilium
    version: 1.19.5
    values:
      - ../k8s/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/app/values.yaml
  - name: kubelet-csr-approver
    namespace: kube-system
    chart: oci://ghcr.io/postfinance/charts/kubelet-csr-approver
    version: 1.2.14
    values:
      - ../k8s/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/app/values.yaml
    needs:
      - kube-system/cilium
  - name: spegel
    namespace: kube-system
    chart: oci://ghcr.io/spegel-org/helm-charts/spegel
    version: 0.7.3
    values:
      - ../k8s/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/app/values.yaml
    needs:
      - kube-system/cilium
  - name: longhorn
    namespace: longhorn-system
    chart: oci://ghcr.io/home-operations/charts-mirror/longhorn
    version: 1.12.0
    values:
      - ../k8s/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/app/values.yaml
    needs:
      - kube-system/cilium
  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.53.0
    values:
      - ../k8s/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/app/values.yaml
    needs:
      - kube-system/cilium
  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.53.0
    values:
      - ../k8s/apps/flux-system/flux-operator/instance/values.yaml
    needs:
      - flux-system/flux-operator
