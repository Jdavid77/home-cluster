version: 3
automerge: true
workflows:
  upgrade:
    plan:
      steps:
        - init:
            extra_args: ["-upgrade"]
        - plan
        #  run: terraform show -json $PLANFILE | /plugins/tfplan2md --render-target github
projects:
  - name: akeyless
    dir: terraform/akeyless
    workspace: default
    workflow: upgrade
    autoplan:
      when_modified:
        - "*.tf"
        - ".env"
      enabled: true
  - name: authentik
    dir: terraform/authentik
    workspace: default
    workflow: upgrade
    autoplan:
      when_modified:
        - "*.tf"
        - ".env"
        - "modules/**/*.tf"
      enabled: true
  - name: backblaze
    dir: terraform/backblaze
    workspace: default
    workflow: upgrade
    autoplan:
      when_modified:
        - "*.tf"
        - ".env"
      enabled: true
  - name: garage
    dir: terraform/garage
    workspace: default
    workflow: upgrade
    autoplan:
      when_modified:
        - "*.tf"
        - ".env"
      enabled: true
