# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app substrate
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: *app
    namespace: flux-system
  values:

    auth:
      mode: jwt
      jwt:
        # Must match the actual SA token issuer — on bare-metal this is the API server IP, not kubernetes.default.svc.cluster.local.
        # Verify with: kubectl get --raw /.well-known/openid-configuration | jq .issuer
        issuer: https://192.168.1.110:6443

    createNamespace: false

    # i dont want 6 replicas of this LOL
    valkey:
      enabled: false

    redis:
      clusterAddress: valkey-valkey-substrate.ate-system.svc.cluster.local:6379

    # Use garage
    rustfs:
      enabled: false

    atelet:
      gcpAuthForImagePulls: false
      storageBackend: s3
      extraArgs: []
      extraEnv:
        - name: AWS_ENDPOINT_URL
          value: http://garage.storage.svc.cluster.local:3900
        - name: AWS_REGION
          value: us-east-1
        - name: AWS_S3_USE_PATH_STYLE
          value: "true"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: substrate-secret
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: substrate-secret
              key: AWS_SECRET_ACCESS_KEY

  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: ate-api-server-deployment
            patch: |-
              - op: add
                path: /spec/template/metadata/annotations/reloader.stakater.com~1auto
                value: "true"
