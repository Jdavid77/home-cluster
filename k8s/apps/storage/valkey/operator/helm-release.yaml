# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: valkey-operator
      version: 0.2.7
      interval: 5m
      sourceRef:
        kind: HelmRepository
        name: valkey-charts
  values:
    replicaCount: 1
