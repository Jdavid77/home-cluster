# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-mirror
  namespace: storage
spec:
  interval: 15m
  timeout: 5m
  maxHistory: 2
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile: {type: RuntimeDefault}
    controllers:
      flux-mirror:
        type: cronjob
        cronjob:
          suspend: false
          concurrencyPolicy: Forbid
          timeZone: Europe/Lisbon
          schedule: "0 0 * * *"
          startingDeadlineSeconds: 30
          successfulJobsHistory: 1
          failedJobsHistory: 1
          backoffLimit: 3
          parallelism: 0
        containers:
          app:
            image:
              repository: ghcr.io/fluxcd/flux-mirror
              tag: v0.8.0
            args:
              - sync
              - /config/mirror.yaml
              - --no-progress
              - --drift-exit-code=0
            env:
              DOCKER_CONFIG: /docker
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    persistence:
      config:
        type: configMap
        name: flux-mirror-config
        globalMounts:
          - path: /config/mirror.yaml
            subPath: mirror.yaml
            readOnly: true
      docker-config:
        type: secret
        name: zot-registry-secret
        globalMounts:
          - path: /docker/config.json
            subPath: .dockerconfigjson
            readOnly: true
