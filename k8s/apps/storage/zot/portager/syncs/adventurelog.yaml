# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/portager.portager.io/imagesync_v1alpha1.json
apiVersion: portager.portager.io/v1alpha1
kind: ImageSync
metadata:
  name: adventurelog-frontend
  namespace: storage
spec:
  schedule: "0 0 * * *"
  source:
    registry: ghcr.io
  destination:
    registry: registry.jnobrega.com
    auth:
      method: secret
      secretRef:
        name: zot-registry-secret
    repositoryPrefix: mirror
  createDestinationRepos: true
  images:
    - name: ghcr.io/seanmorley15/adventurelog-frontend
      semver: ">= 0.0.0"
      maxTags: 5
---
# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/portager.portager.io/imagesync_v1alpha1.json
apiVersion: portager.portager.io/v1alpha1
kind: ImageSync
metadata:
  name: adventurelog-backend
  namespace: storage
spec:
  schedule: "0 0 * * *"
  source:
    registry: ghcr.io
  destination:
    registry: registry.jnobrega.com
    auth:
      method: secret
      secretRef:
        name: zot-registry-secret
    repositoryPrefix: mirror
  createDestinationRepos: true
  images:
    - name: ghcr.io/seanmorley15/adventurelog-backend
      semver: ">= 0.0.0"
      maxTags: 5
