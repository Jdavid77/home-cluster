---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zot
  namespace: storage
spec:
  interval: 15m
  chart:
    spec:
      chart: zot
      version: 0.1.98
      sourceRef:
        kind: HelmRepository
        name: zot-charts
        namespace: flux-system
      interval: 15m
  values:
    replicaCount: 3
    mountConfig: true
    configFiles:
      config.json: |
        {
          "distSpecVersion": "1.1.1",
          "storage": {
            "rootDirectory": "/tmp/zot",
            "gc": true,
            "storageDriver": {
              "name": "s3",
              "region": "us-east-1",
              "bucket": "zot",
              "regionendpoint"."http://garage.storage.svc.cluster.local:3900"
              "secure": false,
              "skipverify": true
            }
          },
          "http": {
            "address": "0.0.0.0",
            "port": "5000",
            "auth": {
              "htpasswd": {
                "path": "/secret/htpasswd"
              }
            },
            "accessControl": {
              "repositories": {
                "**": {
                  "policies": [
                    {
                      "users": ["admin"],
                      "actions": ["read", "create", "update"]
                    }
                  ],
                  "anonymousPolicy": []
                }
              }
            }
          },
          "log": {
            "level": "info"
          },
          "extensions": {
            "ui": { "enable": true },
            "search": { "enable": true },
            "scrub": { "enable": true, "interval": "24h" }
          }
        }

    mountSecret: true
    secretFiles:
      htpasswd: |-
        admin:$2y$05$DbI9Wqdhiuw27TuarKdREufBB0TxOFbC.eeytixQvyYNCvsAp1/uG

    env:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: zot-s3
            key: AWS_ACCESS_KEY_ID
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: zot-s3
            key: AWS_SECRET_ACCESS_KEY

    service:
      type: ClusterIP

    persistence: false

  valuesFrom:
    - kind: Secret
      name: zot-secret
      valuesKey: BASIC_AUTH_HEADER
      targetPath: authHeader