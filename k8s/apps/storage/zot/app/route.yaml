apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: zot
spec:
  hostnames:
    - registry.jnobrega.com
  parentRefs:
    - name: internal
      namespace: network
      sectionName: websecure
  rules:
    - backendRefs:
        - name: zot
          port: 5000
      matches:
        - path:
            type: PathPrefix
            value: /
