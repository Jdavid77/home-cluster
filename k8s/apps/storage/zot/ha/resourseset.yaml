apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: zot-ha
  annotations:
    fluxcd.controlplane.io/reconcile: "enabled"
    fluxcd.controlplane.io/reconcileEvery: "10m"
    fluxcd.controlplane.io/reconcileTimeout: "5m"
spec:
  wait: true
  inputs:
    - name: zot-ha-1
      syncPeer: zot-ha-2
    - name: zot-ha-2
      syncPeer: zot-ha-1
  resourcesTemplate: |
    ---
    apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: &secret zot-credentials-<< inputs.name >>
      namespace: storage
    spec:
      refreshInterval: 5m
      secretStoreRef:
        kind: ClusterSecretStore
        name: akeyless-secret-store
      target:
        name: *secret
        template:
          engineVersion: v2
          data:
            sync-credentials.json: |
              {
                "<< inputs.syncPeer >>-zot.storage.svc.cluster.local:5000": {
                  "username": "admin",
                  "password": "{{ .PASSWORD }}"
                }
              }
      dataFrom:
        - extract:
            key: /zot/auth
    ---
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    metadata:
      name: << inputs.name >>
      namespace: storage
    spec:
      interval: 15m
      chart:
        spec:
          chart: zot
          version: 0.1.98
          sourceRef:
            kind: HelmRepository
            name: zot-charts
            namespace: flux-system
          interval: 15m
      values:
        mountConfig: true
        configFiles:
          config.json: |
            {
              "distSpecVersion": "1.1.1",
              "storage": {
                "rootDirectory": "/var/lib/registry",
                "gc": true,
                "gcDelay": "1h",
                "gcInterval": "24h"
              },
              "http": {
                "address": "0.0.0.0",
                "port": "5000",
                "auth": {
                  "htpasswd": {
                    "path": "/secret/htpasswd"
                  }
                },
                "accessControl": {
                  "repositories": {
                    "**": {
                      "policies": [
                        {
                          "users": ["admin"],
                          "actions": ["read", "create", "update"]
                        }
                      ],
                      "anonymousPolicy": []
                    }
                  }
                }
              },
              "log": {
                "level": "info"
              },
              "extensions": {
                "ui": {
                  "enable": true
                },
                "search": {
                  "enable": true
                },
                "sync": {
                  "enable": true,
                  "credentialsFile": "/tmp/sync-credentials.json",
                  "registries": [
                    {
                      "urls": ["http://<< inputs.syncPeer >>.storage.svc.cluster.local:5000"],
                      "onDemand": false,
                      "tlsVerify": false,
                      "pollInterval": "1m",
                      "content": [
                        {
                          "prefix": "**"
                        }
                      ]
                    }
                  ]
                }
              }
            }

        mountSecret: true
        secretFiles:
          htpasswd: |-
            admin:$2y$05$DbI9Wqdhiuw27TuarKdREufBB0TxOFbC.eeytixQvyYNCvsAp1/uG

        extraVolumes:
          - name: zot-credentials-<< inputs.name >>
            secret:
              secretName: zot-credentials-<< inputs.name >>
        extraVolumeMounts:
          - name: zot-credentials-<< inputs.name >>
            mountPath: /tmp/sync-credentials.json
            subPath: sync-credentials.json
            readOnly: true

        service:
          type: ClusterIP

        persistence: true
        pvc:
          create: true
          accessModes:
            - ReadWriteOnce
          storage: 50Gi
          storageClassName: longhorn-zot

      valuesFrom:
        - kind: Secret
          name: zot-secret
          valuesKey: BASIC_AUTH_HEADER
          targetPath: authHeader
