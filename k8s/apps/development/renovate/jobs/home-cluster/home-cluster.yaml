apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: home-cluster
  namespace: development
spec:
  discoveryFilters:
    - "Jdavid77/home-cluster"
  extraEnv:
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_ALLOWED_COMMANDS
      value: '["pnpm run bundle"]'
    - name: RENOVATE_PLATFORM_COMMIT
      value: "true"
  image: ghcr.io/renovatebot/renovate:43.214.4
  parallelism: 5
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  schedule: 0 */12 * * * # Run every 12 hours
  secretRef: jnobrega-bot-auth-token
  webhook:
    enabled: false
  provider:
    name: github
    endpoint: https://api.github.com
