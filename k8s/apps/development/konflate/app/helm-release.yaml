# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.jsonapiVersion: helm.toolkit.fluxcd.io/v2
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
spec:
  chartRef:
    kind: OCIRepository
    name: konflate
    namespace: flux-system
  interval: 1h
  values:
    config:
      repo: github://Jdavid77/home-cluster
      statusChecks: true
      prComments: true
      publicUrl: https://{{ .Release.Name }}.jnobrega.com
      appClientId: "1087240"
    secret:
      existingSecret: konflate-secret
    httpRoute:
      enabled: true
      parentRefs:
        - name: external
          namespace: network
          sectionName: websecure
      hostnames:
        - "{{ .Release.Name }}.jnobrega.com"
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 50m
      limits:
        memory: 1Gi
