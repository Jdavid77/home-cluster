# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secret konflate-secret
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless-secret-store
  target:
    name: *secret
    template:
      data:
        KONFLATE_WEBHOOK_SECRET: "{{ .KONFLATE_WEBHOOK_SECRET }}"
        KONFLATE_APP_PRIVATE_KEY: "{{ .PRIVATE_KEY_PEM }}"
  data:
    - secretKey: PRIVATE_KEY_PEM
      remoteRef:
        key: /github/jnobrega-bot-key
    - secretKey: KONFLATE_WEBHOOK_SECRET
      remoteRef:
        key: /github/konflate-webhook
