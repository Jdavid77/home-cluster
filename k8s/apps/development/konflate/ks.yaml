# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: konflate
spec:
  dependsOn:
    - name: envoy
      namespace: network
    - name: external-secrets-store
      namespace: external-secrets
  targetNamespace: development
  path: ./k8s/apps/development/konflate/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-cluster
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: konflate
      namespace: development
  wait: true
  interval: 30m
  retryInterval: 2m
  timeout: 15m
