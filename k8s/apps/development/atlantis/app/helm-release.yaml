# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app atlantis
spec:
  interval: 15m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: *app
    namespace: flux-system
  maxHistory: 2
  values:

    podTemplate:
      annotations:
        reloader.stakater.com/auto: "true"

    atlantisUrl: "https://atlantis.jnobrega.com"
    orgAllowlist: "github.com/Jdavid77/home-cluster"

    awsSecretName: atlantis-aws

    environment:
      ATLANTIS_WRITE_GIT_CREDS: "true"
      ATLANTIS_GH_APP_KEY_FILE: /tmp/atlantis-app-key.pem
      ATLANTIS_GH_APP_SLUG: jnobrega-atlantis
      SOPS_AGE_KEY_FILE: /tmp/sops/age.agekey
    environmentSecrets:
      - name: ATLANTIS_GH_APP_ID
        secretKeyRef:
          name: atlantis-secret
          key: ATLANTIS_GH_APP_ID
      - name: ATLANTIS_GH_INSTALLATION_ID
        secretKeyRef:
          name: atlantis-secret
          key: ATLANTIS_GH_INSTALLATION_ID
      - name: ATLANTIS_GH_WEBHOOK_SECRET
        secretKeyRef:
          name: atlantis-secret
          key: ATLANTIS_GH_WEBHOOK_SECRET

    extraVolumes:
      - name: gh-app-key
        secret:
          secretName: atlantis-gh-app-key
          items:
            - key: atlantis-app-key.pem
              path: atlantis-app-key.pem
      - name: sops-age-key
        secret:
          secretName: atlantis-sops-age
          items:
            - key: age.agekey
              path: age.agekey

    extraVolumeMounts:
      - name: gh-app-key
        mountPath: /tmp/atlantis-app-key.pem
        subPath: atlantis-app-key.pem
        readOnly: true
      - name: sops-age-key
        mountPath: /tmp/sops/age.agekey
        subPath: age.agekey
        readOnly: true

    defaultTFVersion: "1.9.0"

    service:
      type: ClusterIP
      targetPort: 4141

    ingress:
      enabled: false

    route:
      main:
        enabled: true
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        hostnames:
          - atlantis-internal.jnobrega.com
        parentRefs:
          - name: internal
            namespace: network
            sectionName: websecure
        matches:
          - path:
              type: PathPrefix
              value: /

    extraManifests:
      - apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: atlantis-webhook
          namespace: development
        spec:
          hostnames:
            - atlantis.jnobrega.com
          parentRefs:
            - name: external
              namespace: network
              sectionName: websecure
          rules:
            - matches:
                - path:
                    type: Exact
                    value: /events
              backendRefs:
                - name: atlantis
                  port: 80

    volumeClaim:
      enabled: true
      dataStorage: 5Gi
      storageClassName: "openebs-hostpath"
      accessModes: ["ReadWriteOnce"]

    nodeSelector:
      kubernetes.io/hostname: localstorage-worker1

    servicemonitor:
      enabled: true

    lockingDbType: "redis"

    redis:
      host: dragonfly.storage.svc.cluster.local
      port: 6379
      db: 15
      tlsEnabled: false
      insecureSkipVerify: false
