---
# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: crd-schema-publisher
spec:
  folderRef: "kube-system"
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  configMapRef:
    name: crd-schema-publisher-dashboard
    key: crd-schema-publisher.json