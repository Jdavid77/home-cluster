apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app crd-schema-publisher
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: *app
    namespace: flux-system
  values:
    config:
      cfPagesProject: k8s-schemas-jnobrega
    externalSecret:
      enabled: true
      secretStoreRef:
        name: "akeyless-secret-store"
        kind: ClusterSecretStore
      refreshInterval: 5m
      data:
        - secretKey: CLOUDFLARE_API_TOKEN
          remoteRef:
            key: /crd-schema-publisher/cloudflare
            property: CLOUDFLARE_API_TOKEN
        - secretKey: CLOUDFLARE_ACCOUNT_ID
          remoteRef:
            key: /crd-schema-publisher/cloudflare
            property: CLOUDFLARE_ACCOUNT_ID
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        memory: 200Mi
    metrics:
      podMonitor:
        enabled: true
