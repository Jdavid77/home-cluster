# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
spec:
  interval: 15m
  timeout: 5m
  maxHistory: 2
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      n8n:
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: n8n-secret
        containers:
          n8n:
            image:
              repository: ghcr.io/n8n-io/n8n
              tag: 2.26.0@sha256:9fd68b77fe9c8560e9dad142ba1be109c17b4376121bafc7dac8c2a3c72d8e79
            env:
              #===CORE SETTINGS===
              N8N_VERSION_NOTIFICATIONS_ENABLED: false
              N8N_PERSONALIZATION_ENABLED: true
              N8N_TEMPLATES_ENABLED: true
              N8N_HIRING_BANNER_ENABLED: false
              N8N_USER_MANAGEMENT_DISABLED: false
              N8N_MFA_ENABLED: "false"
              N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
              GENERIC_TIMEZONE: Europe/Lisbon
              #===NETWORK & URL CONFIGURATION===
              N8N_PORT: &port 5678
              N8N_PROTOCOL: "https"
              N8N_HOST: &host "n8n.jnobrega.com"
              WEBHOOK_URL: "https://n8n.jnobrega.com"
              N8N_PROXY_HOPS: "1"
              #===API CONFIGURATION===
              N8N_PUBLIC_API_DISABLED: false
              N8N_PUBLIC_API_SWAGGERUI_DISABLED: true
              #===LOGGING & DIAGNOSTICS===
              N8N_LOG_LEVEL: debug
              N8N_LOG_OUTPUT: console
              N8N_DIAGONISTICS_ENABLED: false
              N8N_METRICS: true
              #===EXECUTION & DATA MANAGEMENT===
              EXECUTIONS_DATA_PRUNE: true
              EXECUTIONS_DATA_MAX_AGE: 7
              N8N_RUNNERS_ENABLED: "true"
              #===COMMUNITY PACKAGES & EXTENSIONS===
              N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE: "true"
              NODE_FUNCTION_ALLOW_BUILTIN: "*"
              #===SMTP CONFIGURATION===
              N8N_SMTP_HOST: mail.gmx.com
              N8N_SMTP_PORT: 587
              N8N_SMTP_SSL: "false"
            resources:
              requests:
                cpu: 20m
                memory: 256M
              limits:
                memory: 512M
            envFrom:
              - secretRef:
                  name: n8n-secret
    service:
      n8n:
        controller: n8n
        ports:
          http:
            port: *port
    route:
      main:
        parentRefs:
          - kind: Gateway
            name: internal
            namespace: network
            sectionName: websecure
        hostnames:
          - n8n.jnobrega.com
        rules:
          - backendRefs:
              - name: n8n
                port: *port
      form:
        parentRefs:
          - kind: Gateway
            name: external
            namespace: network
            sectionName: websecure
        hostnames:
          - n8n-form.jnobrega.com
        rules:
          - matches:
              - path:
                  value: /form
            backendRefs: [{}]
    persistence:
      config:
        existingClaim: n8n
        advancedMounts:
          n8n:
            n8n:
              - path: /home/node/.n8n
    serviceMonitor:
      main:
        enabled: true
        serviceName: n8n
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
