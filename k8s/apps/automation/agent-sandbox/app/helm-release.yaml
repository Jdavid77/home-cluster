# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/source.toolkit.fluxcd.io/gitrepository_v1
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: agent-sandbox
spec:
  interval: 1h
  url: https://github.com/kubernetes-sigs/agent-sandbox
  ref:
    tag: v0.5.1
  ignore: |-
    # exclude all
    /*
    # include chart directory
    !/helm/
---
# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agent-sandbox
spec:
  interval: 15m
  timeout: 5m
  maxHistory: 2
  chart:
    spec:
      chart: ./helm
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: GitRepository
        name: agent-sandbox
  values:
    namespace:
      create: false
      name: automation
    image:
      # renovate: datasource=docker depName=registry.k8s.io/agent-sandbox/agent-sandbox-controller
      tag: v0.5.2
    controller:
      extensions: true
