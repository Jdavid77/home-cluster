apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: kubernetes-mcp
  namespace: automation
spec:
  transportType: http
  httpTransport:
    targetPort: 8080
  deployment:
    image: ghcr.io/containers/kubernetes-mcp-server:v0.0.60
    port: 8080
    serviceAccountName: kubernetes-mcp
    args:
      - "--config"
      - "/etc/kubernetes-mcp-server/config.toml"
    securityContext:
      runAsNonRoot: true
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
      seccompProfile:
        type: RuntimeDefault
    volumeMounts:
      - name: config
        mountPath: /etc/kubernetes-mcp-server
    volumes:
      - name: config
        configMap:
          name: kubernetes-mcp-config
