# Server settings
log_level = 2
port = "8080"
list_output = "table"
stateless = true

# Kubernetes connection
cluster_provider_strategy = "in-cluster"

# Access control
read_only = true
disable_destructive = true

# Toolsets
toolsets = ["core", "config", "helm"]

# Denied resources
[[denied_resources]]
group = ""
version = "v1"
kind = "Secret"

# Telemetry (OpenTelemetry)
[telemetry]
endpoint = "http://localhost:4317"
