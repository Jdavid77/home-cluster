# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/kagent.dev/agentharness_v1alpha2
apiVersion: kagent.dev/v1alpha2
kind: AgentHarness
metadata:
  name: hermes
  namespace: automation
spec:
  backend: hermes
  modelConfigRef: default-model-config
  runtime: substrate
  substrate:
    gatewayTokenSecretRef:
      name: hermes-gateway-token
    workerPoolRef:
      name: kagent-default
