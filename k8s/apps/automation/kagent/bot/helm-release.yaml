---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kagent-discord-bot
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/jdavid77/kagent-a2a-discord
              tag: 0.1.0@sha256:d7ba552ad8c704425a1224e4b01bd2869f81ccc8c45a57fc8950502d74a6ba49
            envFrom:
              - secretRef:
                  name: kagent-discord-bot-secret
            env:
              DISCORD_MENTION_ONLY: true
              KAGENT_A2A_URL: http://kagent-controller.automation.svc.cluster.local:8083/api/a2a/automation/flux-agent/
            resources:
              requests:
                cpu: 100m
                memory: 100Mi
              limits:
                memory: 200Mi
