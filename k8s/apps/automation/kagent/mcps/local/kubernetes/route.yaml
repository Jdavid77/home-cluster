apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kubernetes-mcp-server
spec:
  parentRefs:
    - kind: Gateway
      name: internal
      namespace: network
      sectionName: websecure
  hostnames:
    - kubernetes-mcp.jnobrega.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: kubernetes-mcp-server
          port: 8080
