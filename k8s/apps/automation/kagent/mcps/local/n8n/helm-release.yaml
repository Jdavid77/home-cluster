# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app n8n-mcp
spec:
  interval: 15m
  timeout: 5m
  maxHistory: 2
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      *app:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        containers:
          app:
            image:
              repository: ghcr.io/czlonkowski/n8n-mcp
              tag: 2.51.1
            env:
              MCP_MODE: http
              PORT: "3000"
              N8N_API_URL: http://n8n.automation.svc.cluster.local:5678
              # SSRF protection mode: 'moderate' allows in-cluster n8n;
              # 'strict' would refuse the cluster-DNS upstream.
              SSRF_PROTECTION_MODE: moderate
              DISABLE_CONSOLE_OUTPUT: "false"
            envFrom:
              - secretRef:
                  name: n8n-mcp-secret
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
    service:
      app:
        controller: *app
        ports:
          http:
            port: 3000
    route:
      app:
        hostnames:
          - "n8n-mcp.jnobrega.com"
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 404"]
        parentRefs:
          - name: internal
            namespace: network
            sectionName: websecure
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /mcp
            backendRefs:
              - identifier: app
                port: 3000
    persistence:
      tmp:
        type: emptyDir
        advancedMounts:
          n8n-mcp:
            app:
              - path: /tmp
                subPath: tmp
              - path: /app/.cache
                subPath: cache
