# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app flux-mcp
spec:
  interval: 15m
  timeout: 5m
  maxHistory: 2
  chartRef:
    kind: OCIRepository
    name: *app
    namespace: flux-system
  values:
    transport: http
    readonly: true
    networkPolicy:
      create: false
    httpRoute:
      enabled: true
      parentRefs:
        - kind: Gateway
          name: internal
          namespace: network
          sectionName: websecure
      hostnames:
        - flux-mcp.jnobrega.com
