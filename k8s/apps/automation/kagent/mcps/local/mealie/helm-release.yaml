# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mealie-mcp-server
spec:
  interval: 15m
  timeout: 5m
  maxHistory: 2
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/jdavid77/mealie-mcp-ts
              tag: 2026.06.15 # {"$imagepolicy": "automation:mealie-mcp-ts:tag"}
            env:
              MEALIE_URL: http://mealie.default.svc.cluster.local:9000
              ALLOWED_HOSTS: "mealie-mcp.jnobrega.com,localhost,mealie-agent.automation.svc.cluster.local"
            envFrom:
              - secretRef:
                  name: mealie-mcp-secret
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: *app
        ports:
          http:
            port: 3000
    route:
      app:
        hostnames:
          - "mealie-mcp.jnobrega.com"
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 404"]
        parentRefs:
          - name: internal
            namespace: network
            sectionName: websecure
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /mcp
            backendRefs:
              - identifier: app
                port: 3000
