# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/image.toolkit.fluxcd.io/imagerepository_v1.json
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: n8n-mcp
spec:
  image: registry.jnobrega.com/mirror/czlonkowski/n8n-mcp
  interval: 5m
  provider: generic
  secretRef:
    name: zot-registry-secret
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: &repo n8n-mcp
spec:
  imageRepositoryRef:
    name: *repo
  policy:
    semver:
      range: '>=2.0.0'
