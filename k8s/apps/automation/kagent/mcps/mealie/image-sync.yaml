# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/image.toolkit.fluxcd.io/imagerepository_v1.json
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: mealie-mcp-ts
spec:
  image: ghcr.io/jdavid77/mealie-mcp-ts
  interval: 5m
  provider: generic
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: mealie-mcp-ts
spec:
  imageRepositoryRef:
    name: mealie-mcp-ts
  filterTags:
    pattern: '^\d{4}\.\d{2}\.\d{2}$'
  policy:
    alphabetical:
      order: asc
