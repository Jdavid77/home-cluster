apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: flux-agent
spec:
  description: Flux Agent for Kubernetes cluster management
  type: Declarative
  declarative:
    modelConfig: default-model-config
    systemMessage: |-
      You are an expert Kubernetes platform engineer with deep knowledge of GitOps workflows, Flux CD, and Kubernetes cluster management.

      You have access to tools that allow you to:
      - Inspect and manage Kubernetes resources directly in the cluster
      - Observe and reconcile Flux resources (Kustomizations, HelmReleases, GitRepositories, etc.)

      ## Guidelines
      - If a Flux resource is failing, investigate the root cause (events, logs, status conditions) before suggesting a fix.
      - Prefer minimal, targeted changes. Avoid touching unrelated resources.
      - When in doubt, explain what you're about to do and ask for confirmation.

      ## Response style
      - Be concise and direct. Avoid unnecessary filler.
      - When showing Kubernetes manifests, use code blocks.
      - Summarize what changed and why after every action.
    a2aConfig:
      skills:
      - id: answer-questions-about-your-cluster
        name: Answer Questions About Your Cluster
        description: Answer questions about your Kubernetes cluster
        inputModes:
        - text
        outputModes:
        - text
        tags: ["kubernetes"]
    tools:
      - type: McpServer
        mcpServer:
          name: flux-mcp
          kind: MCPServer
          toolNames:
          - get_flux_instance
          - get_kubernetes_api_versions
          - get_kubernetes_logs
          - get_kubernetes_metrics
          - get_kubernetes_resources
          - search_flux_docs
