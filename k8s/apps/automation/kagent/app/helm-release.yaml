# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kagent
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: *app
    namespace: flux-system
  values:
    provider: "gemini"
    kmcp:
      enabled: false
    tools:
      grafana-mcp:
        enabled: false
      querydoc:
        enabled: false