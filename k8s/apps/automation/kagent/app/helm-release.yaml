# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kagent
spec:
  interval: 30m
  # https://github.com/kagent-dev/kagent/issues/695
  chart:
    spec:
      chart: *app
      version: 0.8.6
      sourceRef:
        kind: HelmRepository
        name: kagent-charts
        namespace: flux-system
      interval: 5m
  values:
    providers:
      default: "openAI"
      openAI:
        provider: OpenAI
        model: "gpt-5.4-mini"
    kmcp:
      enabled: true
    tools:
      grafana-mcp:
        enabled: false
      querydoc:
        enabled: false
    agents:
      k8s-agent:
        enabled: true
      promql-agent:
        enabled: true
      observability-agent:
        enabled: false
      helm-agent:
        enabled: true
      kgateway-agent:
        enabled: false
      istio-agent:
        enabled: false
      argo-rollouts-agent:
        enabled: false
      cilium-policy-agent:
        enabled: false
      cilium-manager-agent:
        enabled: false
      cilium-debug-agent:
        enabled: false
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: kagent-controller
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: kagent-controller
              spec:
                template:
                  spec:
                    initContainers:
                      - name: init-db
                        image: ghcr.io/home-operations/postgres-init:18.3@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
                        securityContext:
                          runAsUser: 65534
                        envFrom:
                          - secretRef:
                              name: kagent-secret