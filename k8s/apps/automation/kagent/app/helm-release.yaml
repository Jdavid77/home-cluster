# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kagent
spec:
  interval: 30m
  # https://github.com/kagent-dev/kagent/issues/695
  chart:
    spec:
      chart: *app
      version: 0.8.6
      sourceRef:
        kind: HelmRepository
        name: kagent-charts
        namespace: flux-system
      interval: 5m
  values:
    provider: "gemini"
    kmcp:
      enabled: false
    tools:
      grafana-mcp:
        enabled: false
      querydoc:
        enabled: false