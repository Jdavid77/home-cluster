# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: automation
spec:
  chart:
    spec:
      chart: kagent
      version: 0.9.11
      interval: 5m
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: kagent-charts
  install:
    crds: CreateReplace
    remediation:
      retries: 3
    strategy:
      name: RetryOnFailure
  interval: 15m
  timeout: 5m
  maxHistory: 2
  postRenderers:
    - kustomize:
        patches:
          - patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: kagent-controller
              spec:
                template:
                  spec:
                    volumes:
                      - name: kagent-secret-vol
                        secret:
                          secretName: kagent-secret
                          items:
                            - key: POSTGRES_DATABASE_URL
                              path: POSTGRES_DATABASE_URL
                    initContainers:
                      - name: init-db
                        image: ghcr.io/home-operations/postgres-init:18.4@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
                        securityContext:
                          runAsUser: 65534
                        envFrom:
                          - secretRef:
                              name: kagent-secret
                    containers:
                      - name: controller
                        volumeMounts:
                          - name: kagent-secret-vol
                            mountPath: /secrets
                            readOnly: true
            target:
              kind: Deployment
              name: kagent-controller
  rollback:
    cleanupOnFail: true
    recreate: true
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
      strategy: rollback
  values:
    controller:
      openshell:
        enabled: true
      substrate:
        enabled: true
        ateApiEndpoint: dns:///api.ate-system.svc:443
        ateApiInsecure: true
      env:
        - name: OPENSHELL_GATEWAY_URL
          value: dns:///openshell.automation.svc:8080
        - name: OPENSHELL_INSECURE
          value: "true"
    substrateWorkerPool:
      create: true
      ateomImage: ghcr.io/kagent-dev/substrate/ateom-gvisor:v0.0.9
      replicas: 2
    database:
      postgres:
        bundled:
          enabled: false
        urlFile: /secrets/POSTGRES_DATABASE_URL
    providers:
      default: openAI
      openAI:
        provider: OpenAI
        model: gpt-5.4-mini
        apiKeySecretRef: kagent-openai
        apiKeySecretKey: OPENAI_API_KEY
    # Enable MCP Tools
    kmcp:
      enabled: true
    kagent-tools:
      enabled: true
    grafana-mcp:
      enabled: true
      grafana:
        url: http://grafana-service.monitoring.svc.cluster.local:3000
    # Disable Agent CR's , converted into Sandbox Agents
    querydoc:
      enabled: false
    k8s-agent:
      enabled: false
    kgateway-agent:
      enabled: false
    helm-agent:
      enabled: false
    cilium-policy-agent:
      enabled: false
    observability-agent:
      enabled: false
    promql-agent:
      enabled: false
    argo-rollouts-agent:
      enabled: false
    istio-agent:
      enabled: false
    cilium-manager-agent:
      enabled: false
    cilium-debug-agent:
      enabled: false
  valuesFrom:
    - kind: Secret
      name: grafana-service-account-token
      targetPath: grafana-mcp.grafana.serviceAccountToken
      valuesKey: token
