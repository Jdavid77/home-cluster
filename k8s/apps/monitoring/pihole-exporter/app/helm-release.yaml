# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2beta2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pihole-exporter
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      pihole-exporter:
        containers:
          pihole-exporter:
            image:
              repository: ekofr/pihole-exporter
              tag: latest@sha256:36dab68a7e4b2750802e2326d9340201dc498ac429cbd89cdfb45cbab3fef081
            env:
              PIHOLE_HOSTNAME: 192.168.1.139
              PORT: &port 9617
              PIHOLE_PROTOCOL: http
            envFrom:
              - secretRef:
                  name: pihole-exporter-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 15m
              limits:
                memory: 60M
    service:
      pihole-exporter:
        controller: pihole-exporter
        ports:
          http:
            port: *port
    serviceMonitor:
      pihole-exporter:
        serviceName: pihole-exporter
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 2m
            scrapeTimeout: 1m
