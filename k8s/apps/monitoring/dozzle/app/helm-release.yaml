# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dozzle
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          dozzle:
            image:
              repository: docker.io/amir20/dozzle
              tag: v10.6.7@sha256:43d933ebda116990c920e054d68a1aed286ab01fd31657983c53bbdf46cc0aa8
            env:
              DOZZLE_MODE: k8s
              DOZZLE_NO_ANALYTICS: "true"
              DOZZLE_TIMEOUT: "60s"
              TZ: Europe/Lisbon
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /dozzle
                      - healthcheck
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
        serviceAccount:
          identifier: dozzle
    defaultPodOptions:
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    route:
      main:
        parentRefs:
          - kind: Gateway
            name: internal
            namespace: network
            sectionName: websecure
        hostnames:
          - logs.jnobrega.com
        rules:
          - backendRefs:
              - name: *app
                port: &port 8080
    service:
      dozzle:
        controller: *app
        ports:
          http:
            port: *port
    serviceAccount:
      dozzle: {}
    rbac:
      bindings:
        dozzle:
          type: ClusterRoleBinding
          roleRef:
            kind: ClusterRole
            name: dozzle
          subjects:
            - identifier: dozzle
      roles:
        dozzle:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources: ["pods", "pods/log", "nodes"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["metrics.k8s.io"]
              resources: ["pods"]
              verbs: ["get", "list"]
