# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-operator
  namespace: monitoring
spec:
  interval: 15m
  timeout: 5m
  maxHistory: 2
  chartRef:
    kind: OCIRepository
    name: opentelemetry-operator
    namespace: flux-system
  values:
    manager:
      image:
        repository: ghcr.io/open-telemetry/opentelemetry-operator/opentelemetry-operator
        tag: v0.154.0@sha256:b4896429a206252d96d0cba91893f408be985d45c5b94f211f39dd6eeb7d6b25
      collectorImage:
        repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
        tag: 0.156.0@sha256:84036a61f0ee4a7aaa62f357a822ec2738b81a986d70fe12ff23fefce34ae8d1
    admissionWebhooks:
      certManager:
        enabled: false
