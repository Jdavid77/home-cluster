# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app metube
spec:
  targetNamespace: media
  dependsOn:
    - name: volsync
      namespace: backup
    - name: envoy
      namespace: network
  path: ./k8s/apps/media/metube/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-cluster
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: metube
      namespace: media
  components:
    - ../../../../components/volsync/local
    - ../../../../components/volsync/remote
    - ../../../../components/keda/nfs
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_PGID: &uid "100"
      VOLSYNC_PUID: "1002"
      VOLSYNC_CACHE_CAPACITY: 512Mi
  wait: true
  interval: 30m
  retryInterval: 2m
  timeout: 15m
