# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app booklore
spec:
  interval: 15m
  timeout: 5m
  maxHistory: 2
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      *app:
        containers:
          *app:
            image:
              repository: registry.jnobrega.com/mirror/grimmory-tools/grimmory
              tag: v3.2.2 # {"$imagepolicy": "media:grimmory:tag"}
            env:
              TZ: Europe/Lisbon
              USER_ID: 1002
              GROUP_ID: 100
              DATABASE_URL: "jdbc:mariadb://localhost:3306/booklore"
              DATABASE_USERNAME: booklore
              DATABASE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: booklore-secret
                    key: DATABASE_PASSWORD
              SWAGGER_ENABLED: "false"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: &port 6060
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
          mariadb:
            image:
              repository: lscr.io/linuxserver/mariadb
              tag: 11.4.12@sha256:c91db738382496703170542656f346d8b7f33d4ef5b5fa97f32e911402b389b6
            env:
              TZ: Europe/Lisbon
              MYSQL_USER: booklore
              MYSQL_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: booklore-secret
                    key: DATABASE_PASSWORD
              MYSQL_DATABASE: booklore
              MYSQL_ROOT_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: booklore-secret
                    key: DATABASE_ROOT_PASSWORD
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    defaultPodOptions:
      imagePullSecrets:
        - name: zot-registry-secret
    route:
      main:
        parentRefs:
          - kind: Gateway
            name: internal
            namespace: network
            sectionName: websecure
        hostnames:
          - books.jnobrega.com
        rules:
          - backendRefs:
              - name: *app
                port: *port
    persistence:
      data:
        existingClaim: *app
        advancedMounts:
          *app:
            *app:
              - path: /app/data
      config:
        existingClaim: mariadb
        advancedMounts:
          *app:
            mariadb:
              - path: /config
      books:
        type: nfs
        server: 192.168.1.84
        path: /ebooks
        advancedMounts:
          *app:
            *app:
              - path: /books
      bookdrop:
        type: nfs
        server: 192.168.1.84
        path: /book-ingests
        advancedMounts:
          *app:
            *app:
              - path: /bookdrop
