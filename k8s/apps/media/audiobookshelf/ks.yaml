# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app audiobookshelf
spec:
  targetNamespace: media
  path: ./k8s/apps/media/audiobookshelf/app
  dependsOn:
    - name: volsync
      namespace: backup
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: audiobookshelf
      namespace: media
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-cluster
    namespace: flux-system
  components:
    - ../../../../components/volsync/local
    - ../../../../components/volsync/remote
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_PGID: &uid "100"
      VOLSYNC_PUID: "1002"
      VOLSYNC_CACHE_CAPACITY: 512Mi
  wait: true
  interval: 30m
  retryInterval: 2m
  timeout: 15m
