# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/tailscale.com/connector_v1alpha1.json
apiVersion: tailscale.com/v1alpha1
kind: Connector
metadata:
  name: home-network
spec:
  hostname: home-network
  proxyClass: kernel-org-tun
  subnetRouter:
    advertiseRoutes:
      - 192.168.1.251/32 # LB
      - 192.168.1.139/32 # DNS
      - 192.168.1.110/32 # DNS
