# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app vaultwarden
spec:
  interval: 15m
  timeout: 5m
  maxHistory: 2
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      vaultwarden:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: vaultwarden-secret
        containers:
          vaultwarden:
            image:
              repository: ghcr.io/dani-garcia/vaultwarden
              tag: 1.36.0-alpine@sha256:d3531610b486905943706b235e97159331801c6856e1367a93a5905e2b40f204
            env:
              DOMAIN: "https://vaultwarden.jnobrega.com"
              TZ: Europe/Lisbon
              SIGNUPS_ALLOWED: "false"
              INVITATIONS_ALLOWED: "true"
              WEBSOCKET_ENABLED: "true"
              WEBSOCKET_ADDRESS: 0.0.0.0
              WEBSOCKET_PORT: 3012
              SMTP_HOST: mail.gmx.com
              SMTP_FROM_NAME: Vaultwarden
              SMTP_PORT: 587
              SMTP_SECURITY: "starttls"
              ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN_HASHED}
              TRASH_AUTO_DELETE_DAYS: 7
              PASSWORD_HINTS_ALLOWED: false
            envFrom:
              - secretRef:
                  name: vaultwarden-secret
            probes:
              liveness: &probes
                enabled: false
              readiness: *probes
              startup: *probes
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 250Mi
    service:
      vaultwarden:
        controller: vaultwarden
        ports:
          http:
            port: &port 80
    route:
      main:
        parentRefs:
          - kind: Gateway
            name: internal
            namespace: network
            sectionName: websecure
        hostnames:
          - vaultwarden.jnobrega.com
        rules:
          - backendRefs:
              - name: *app
                port: *port
