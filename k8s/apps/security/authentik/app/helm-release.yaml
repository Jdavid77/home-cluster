# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  interval: 15m
  timeout: 5m
  maxHistory: 2
  chartRef:
    kind: OCIRepository
    name: authentik
    namespace: flux-system
  values:
    global:
      podAnnotations:
        secret.reloader.stakater.com/reload: &secret authentik-secret
      envFrom:
        - secretRef:
            name: *secret
    server:
      replicas: 2
      initContainers:
        - name: init-db
          image: ghcr.io/home-operations/postgres-init:18.3@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
          envFrom:
            - secretRef:
                name: *secret
      route:
        main:
          enabled: true
          hostnames:
            - "auth.jnobrega.com"
          parentRefs:
            - name: external
              namespace: network
              sectionName: websecure
      metrics:
        enabled: false
        serviceMonitor:
          enabled: false
      resources:
        requests:
          cpu: 200m
        limits:
          memory: 2Gi
    worker:
      replicas: 2
      resources:
        requests:
          cpu: 200m
        limits:
          memory: 2Gi
    prometheus:
      rules:
        enabled: true
