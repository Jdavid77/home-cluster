# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/tekton.dev/pipeline_v1.json
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: bulk-merges
  namespace: tekton-operator
spec:
  description: |
    This pipeline merges PR's from Renovate based on labels.
  params:
    - name: repo-url
      type: string
      description: The git repo URL to clone from.
  workspaces:
    - name: shared-data
      description: |
        This workspace contains the cloned repo files, so they can be read by the
        next task.
    - name: git-credentials
      description: My Git credentials
  tasks:
    - name: fetch-source
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-data
        - name: basic-auth
          workspace: git-credentials
      params:
        - name: url
          value: $(params.repo-url)
    - name: merge-prs
      runAfter: ["fetch-source"]
      taskRef:
        name: merge-prs
      workspaces:
        - name: source
          workspace: shared-data
