# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app filebrowser
spec:
  targetNamespace: default
  dependsOn:
    - name: volsync
      namespace: backup
    - name: envoy
      namespace: network
  path: ./k8s/apps/default/filebrowser/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-cluster
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: filebrowser
      namespace: default
  components:
    - ../../../../components/volsync/local
    - ../../../../components/volsync/remote
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_PGID: &uid "568"
      VOLSYNC_PUID: *uid
      VOLSYNC_CACHE_CAPACITY: 512Mi
  wait: true
  interval: 30m
  retryInterval: 2m
  timeout: 15m
