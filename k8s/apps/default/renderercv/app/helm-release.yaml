# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app renderercv
  namespace: default
spec:
  interval: 15m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  values:
    defaultPodOptions:
      imagePullSecrets:
        - name: zot-registry-secret
      automountServiceAccountToken: false
    controllers:
      *app :
        replicas: 1
        strategy: Recreate
        containers:
          app:
            image:
              repository: registry.jnobrega.com/mirror/rendercv/rendercv
              tag: v2.8 # {"$imagepolicy": "default:rendercv:tag"}
            probes:
              liveness: &probes
                enabled: false
              readiness: *probes
              startup: *probes
            resources:
              limits:
                memory: 100Mi
              requests:
                cpu: 50m
            workingDir: /work
            command: ["tail"]
            args: ["-f", "/dev/null"]
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              runAsNonRoot: true
              runAsUser: 999
              runAsGroup: 999
              seccompProfile: {type: RuntimeDefault}
          code-server:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.129.0@sha256:49d5e176224523b0c924ee35b05c51e9a87f9c170f650ee0f7da05a4581a79ff
            securityContext:
              runAsUser: 0
            args: ["--auth", "none", "--disable-telemetry", "--disable-update-check", "--user-data-dir", "/tmp/.vscode", "--extensions-dir", "/tmp/.vs1ode", "--port", "8081", "/config"]
          nginx:
            image:
              repository: public.ecr.aws/nginx/nginx-unprivileged
              tag: stable-alpine
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              runAsNonRoot: true
              runAsUser: 101
              runAsGroup: 101
              seccompProfile: {type: RuntimeDefault}
    service:
      code-server:
        controller: *app
        ports:
          http:
            port: &codePort 8081
      nginx:
        controller: *app
        ports:
          http:
            port: &nginxPort 8080
    route:
      code:
        parentRefs:
          - kind: Gateway
            name: internal
            namespace: network
            sectionName: websecure
        hostnames:
          - code-cv.jnobrega.com
        rules:
          - backendRefs:
              - name: renderercv-code-server
                port: *codePort
      nginx:
        parentRefs:
          - kind: Gateway
            name: external
            namespace: network
            sectionName: websecure
        hostnames:
          - cv.jnobrega.com
        rules:
          - backendRefs:
              - name: renderercv-nginx
                port: *nginxPort
    persistence:
      nginx:
        enabled: true
        type: configMap
        name: nginx-config
        advancedMounts:
          *app :
            nginx:
              - path: /etc/nginx/conf.d/default.conf
                subPath: default.conf
      config:
        enabled: true
        existingClaim: *app
        advancedMounts:
          *app :
            app:
              - path: /work
            code-server:
              - path: /config
            nginx:
              - path: /work/cv.pdf
                subPath: cv.pdf
      temp:
        enabled: true
        type: emptyDir
        advancedMounts:
          *app :
            code-server:
              - path: /tmp/.vscode
