# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app linkding
spec:
  dependsOn:
    - name: volsync
      namespace: backup
    - name: external-secrets-store
      namespace: external-secrets
  targetNamespace: default
  path: ./k8s/apps/default/linkding/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-cluster
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: linkding
      namespace: default
  healthCheckExprs:
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.reason == 'SecretSyncedError')
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.reason == 'SecretSynced')
  components:
    - ../../../../components/volsync/local
    - ../../../../components/volsync/remote
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_PGID: &uid "568"
      VOLSYNC_PUID: *uid
      VOLSYNC_CACHE_CAPACITY: 1Gi
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
