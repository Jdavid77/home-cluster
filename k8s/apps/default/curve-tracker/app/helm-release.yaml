# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app curve-tracker
spec:
  interval: 15m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
              pullPolicy: IfNotPresent
            envFrom: &secret
              - secretRef:
                  name: curve-tracker-secret
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
        containers:
          app:
            image:
              repository: ghcr.io/jdavid77/curve-tracker
              tag: 2026.06.27 # {"$imagepolicy": "default:curve-tracker:tag"}
            env:
              APP_BASE_URL: "https://curve.jnobrega.com"
              CACHE_TTL_MS: "18000000"
              REDIS_URL: redis://dragonfly-curve-tracker.default.svc.cluster.local:6379
            envFrom:
              - secretRef:
                  name: curve-tracker-secret
              - secretRef:
                  name: curve-tracker-google
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    service:
      main:
        controller: *app
        ports:
          http:
            port: &port 3000
    defaultPodOptions:
      imagePullSecrets:
        - name: gh-secret
    route:
      main:
        hostnames: ["curve.jnobrega.com"]
        parentRefs:
          - name: internal
            namespace: network
            sectionName: websecure
        rules:
          - backendRefs:
              - name: *app
                port: *port
    persistence:
      config:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /app/data
