# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app curve-tracker
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 3
  values:
    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
        containers:
          app:
            image:
              repository: ghcr.io/jdavid77/curve-tracker
              tag: 1.0.0 # {"$imagepolicy": "flux-system:curve-tracker:tag"}
            env:
              APP_BASE_URL: "https://curve.jnobrega.com"
            envFrom:
              - secretRef:
                  name: curve-tracker-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

    service:
      main:
        controller: *app
        ports:
          http:
            port: &port 3000

    defaultPodOptions:
      imagePullSecrets:
        - name: gh-secret

    route:
      main:
        hostnames: ["curve.jnobrega.com"]
        parentRefs:
          - name: internal
            namespace: network
            sectionName: websecure
        rules:
          - backendRefs:
              - name: *app
                port: *port

    persistence:
      config:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /app/data