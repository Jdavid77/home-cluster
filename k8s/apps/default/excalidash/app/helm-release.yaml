# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app excalidash
spec:
  interval: 15m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  values:
    controllers:
      excalidash:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          backend:
            image:
              repository: zimengxiong/excalidash-backend
              tag: 0.5.0@sha256:aa86b392a64e2235e3cf0c6289f5b58182b7eb8e391851e480c947b8226abce4
            env:
              DATABASE_URL: file:/app/prisma/dev.db
              PORT: 8000
              NODE_ENV: production
              FRONTEND_URL: https://excalidash.jnobrega.com
            probes:
              liveness: &probes-backend
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness: *probes-backend
          frontend:
            image:
              repository: zimengxiong/excalidash-frontend
              tag: 0.5.0@sha256:8f4920ba204ac672bce8df9b963bbf749beef35e9ccaf0b108f2e3278a1aff75
            env:
              BACKEND_URL: localhost:8000
            probes:
              liveness: &probes-frontend
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 80
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness: *probes-frontend
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      main:
        hostnames: ["excalidash.jnobrega.com"]
        parentRefs:
          - name: internal
            namespace: network
            sectionName: websecure
        rules:
          - backendRefs:
              - name: *app
                port: *port
    persistence:
      config:
        enabled: true
        existingClaim: *app
        advancedMounts:
          excalidash:
            backend:
              - path: /app/prisma
