# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app excalidash
spec:
  dependsOn:
    - name: volsync
      namespace: backup
  targetNamespace: default
  path: ./k8s/apps/default/excalidash/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-cluster
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: excalidash
      namespace: default
  components:
    - ../../../../components/volsync/remote
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_PGID: &uid "100"
      VOLSYNC_PUID: "1002"
      VOLSYNC_CACHE_CAPACITY: 1Gi
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
