# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/longhorn.io/recurringjob_v1beta2.json
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: trim
  namespace: longhorn-system
spec:
  cron: "0 12 * * *"
  task: "filesystem-trim"
  groups:
    - default
  concurrency: 40
