apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: ryanair-api
  namespace: flux-system
spec:
  image: ghcr.io/jdavid77/ryanair-api
  interval: 5m
  provider: generic
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: ryanair-api
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: ryanair-api
  policy:
    semver:
      range: '>=1.1.0'
