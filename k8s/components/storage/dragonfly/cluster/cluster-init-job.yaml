apiVersion: batch/v1
kind: Job
metadata:
  name: dragonfly-${APP}-cluster-init
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: redis:8-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |-
              set -e

              HEADLESS_SVC="dragonfly-${APP}-headless"
              ADMIN_PORT=9999
              REDIS_PORT=6379

              echo "==> Resolving pod IPs from headless service..."
              until PODS=$(nslookup "$HEADLESS_SVC" | awk '/^Address: [0-9]/{print $2}') && [ -n "$PODS" ]; do
                echo "    waiting for DNS..."
                sleep 3
              done
              echo "    pods: $PODS"

              echo "==> Waiting for all pods to be ready on :$ADMIN_PORT..."
              for ip in $PODS; do
                until redis-cli -h "$ip" -p $ADMIN_PORT PING > /dev/null 2>&1; do
                  echo "    waiting for $ip..."
                  sleep 3
                done
                echo "    $ip OK"
              done

              echo "==> Checking if cluster is already configured..."
              FIRST_IP=$(echo "$PODS" | head -1)
              STATUS=$(redis-cli -h "$FIRST_IP" -p $ADMIN_PORT CLUSTER INFO 2>&1 | grep "cluster_state" || true)
              if echo "$STATUS" | grep -q "cluster_state:ok"; then
                echo "    Cluster already configured, exiting."
                exit 0
              fi

              echo "==> Identifying master and replicas..."
              MASTER_IP=""
              REPLICA_IPS=""
              for ip in $PODS; do
                ROLE=$(redis-cli -h "$ip" -p $REDIS_PORT INFO replication 2>/dev/null | grep "^role:" | tr -d '\r' | cut -d: -f2)
                echo "    $ip -> role=$ROLE"
                if [ "$ROLE" = "master" ]; then
                  MASTER_IP="$ip"
                else
                  REPLICA_IPS="$REPLICA_IPS $ip"
                fi
              done

              if [ -z "$MASTER_IP" ]; then
                echo "ERROR: no master found, retrying..."
                exit 1
              fi

              echo "==> Fetching node IDs..."
              MASTER_ID=$(redis-cli -h "$MASTER_IP" -p $REDIS_PORT CLUSTER MYID)
              echo "    master: id=$MASTER_ID ip=$MASTER_IP"

              REPLICAS_JSON="["
              FIRST=true
              for ip in $REPLICA_IPS; do
                REPLICA_ID=$(redis-cli -h "$ip" -p $REDIS_PORT CLUSTER MYID)
                echo "    replica: id=$REPLICA_ID ip=$ip"
                if [ "$FIRST" = "true" ]; then
                  FIRST=false
                else
                  REPLICAS_JSON="${REPLICAS_JSON},"
                fi
                REPLICAS_JSON="${REPLICAS_JSON}{\"id\":\"${REPLICA_ID}\",\"ip\":\"${ip}\",\"port\":${REDIS_PORT}}"
              done
              REPLICAS_JSON="${REPLICAS_JSON}]"

              CONFIG="[{\"slot_ranges\":[{\"start\":0,\"end\":16383}],\"master\":{\"id\":\"${MASTER_ID}\",\"ip\":\"${MASTER_IP}\",\"port\":${REDIS_PORT}},\"replicas\":${REPLICAS_JSON}}]"

              echo "==> Pushing cluster config to all nodes..."
              for ip in $PODS; do
                echo "    configuring $ip..."
                redis-cli -h "$ip" -p $ADMIN_PORT DFLYCLUSTER CONFIG "$CONFIG"
              done

              echo "==> Done. Cluster configured successfully."
